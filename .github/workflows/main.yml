name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  EKS_CLUSTER_NAME: sre-bot-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Target App
        run: |
          docker build -t $DOCKERHUB_USERNAME/target-app:latest ./app
          docker push $DOCKERHUB_USERNAME/target-app:latest

      - name: Build and Push SRE Bot
        run: |
          docker build -t $DOCKERHUB_USERNAME/sre-bot:latest ./sre-bot
          docker push $DOCKERHUB_USERNAME/sre-bot:latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy Manifests
        run: |
          kubectl apply -f ./k8s/app-deployment.yaml
          kubectl apply -f ./k8s/sre-bot-deployment.yaml
