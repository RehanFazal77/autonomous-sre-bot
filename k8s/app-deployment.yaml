apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  labels:
    app: target-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
    spec:
      containers:
      - name: target-app
        image: rehanfazal/target-app:latest # Replace with your Dockerhub username
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: target-app-service
spec:
  selector:
    app: target-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
